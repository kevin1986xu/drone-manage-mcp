# Higress AI 网关（对外服务化 · 关一，见 docs/07）—— 本机 standalone 部署
#
# 定位：对外唯一入口，从**现网 Nacos**（192.168.101.21:8998，已注册 8 个 uav-*-mcp）
#       发现后端 → 聚合为统一、可鉴权、可限流、可审计的 MCP 端点。
#
# 与演示版 deploy/docker-compose.yml 的区别：
#   - 不起本地 Nacos（现网已有且已注册八域）；
#   - Higress 用**内置**配置存储（不接外部 Nacos 存配置，避免污染现网生产 Nacos）；
#   - 现网 Nacos 仅作「服务来源」，起容器后在控制台/API 配置（README 说明）；
#   - 端口避开本机已占：控制台 8001→8888（DeerFlow Gateway 占 8001）、网关 80→8080。
#
# 启动：docker compose -f higress-standalone.docker-compose.yml up -d
# 控制台：http://localhost:8888   网关入口：http://localhost:8080

name: uav-higress

services:
  higress:
    image: higress-registry.cn-hangzhou.cr.aliyuncs.com/higress/all-in-one:latest
    container_name: uav-higress
    # 现网 Nacos 走 VPN 才通，容器要能访问宿主网络到 192.168.101.21
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # all-in-one 容器内端口：网关 8080/8443（envoy）、控制台 8001。别按标准版的 80/8080 记
    ports:
      - "${HIGRESS_GATEWAY_HTTP_PORT:-8080}:8080"   # 网关 HTTP 入口（聚合后的 MCP 端点）
      - "${HIGRESS_GATEWAY_HTTPS_PORT:-8443}:8443"  # 网关 HTTPS 入口
      - "${HIGRESS_CONSOLE_PORT:-8888}:8001"        # Higress 控制台（容器内 8001）
    volumes:
      - higress-data:/data
    restart: unless-stopped

volumes:
  higress-data:
