# Nacos 自定义配置（挂载到 /home/nacos/init.d/custom.properties）
# 目的：开启 MCP Registry（供 Higress 从 ai/mcp 面发现 uav-*-mcp）+ istio mcp server。
# 主端口默认 8848 → 客户端 gRPC 9848（Higress 走这个，干净部署无现网 9998 的 HTTP1 坑）。

# ── AI / MCP Registry（Nacos 3.x）──
nacos.ai.mcp.registry.enabled=true
nacos.istio.mcp.server.enabled=true

# ── 控制台 ──
nacos.console.ui.enabled=true
