# 完整自包含部署——Nacos + Higress + 核心三件套（生产 Linux）
#
# 与 docker-compose.yml（核心三件套 + 外部现网 Nacos）的区别：
#   本文件**自带 Nacos 与 Higress**，全栈同一 docker 网（uav-net）：
#   - 服务间全用容器名互连，mcp 注册到 Nacos 用容器名 → Higress 同网发现，
#     **不再需要 MCP_SERVICE_IP 宿主 IP**（自包含最大简化）；
#   - 用干净的 Nacos 3.x，gRPC 9848 正常，规避现网那台 9998 返 HTTP1 的老坑；
#   - 只有「平台 drone-manage」仍是外部现网（客户已有，我们不部署）。
#
# 对外只暴露：Higress 网关 8080（消费方唯一入口）、控制台 8888、UI 8213。
# mcp/审批/nacos 端口不对宿主暴露（生产收口，仅 uav-net 内）。
#
# 启动：
#   cp .env.docker.example .env.docker && vim .env.docker
#   docker compose -f docker-compose.full.yml --env-file .env.docker up -d --build
#   ./init-higress.sh          # 首次：配 Higress 服务来源 + 消费者鉴权 + 限流
#
# 平台 drone-manage 外部现网 → 容器需能出网访问；Mac 测试加 extra_hosts。

name: uav-full

services:
  # ── 注册中心：Nacos 3.x（MCP Registry）──
  nacos:
    image: nacos/nacos-server:v3.0.2
    container_name: uav-nacos
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_TOKEN: ${NACOS_AUTH_TOKEN}          # base64 解码 ≥32 字节
      NACOS_AUTH_IDENTITY_KEY: ${NACOS_AUTH_IDENTITY_KEY:-serverIdentity}
      NACOS_AUTH_IDENTITY_VALUE: ${NACOS_AUTH_IDENTITY_VALUE:-security}
    volumes:
      - nacos-data:/home/nacos/data
      - ./nacos-conf/custom.properties:/home/nacos/init.d/custom.properties:ro
    networks: [uav-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v3/console/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 20

  # ── 对外网关：Higress（从 Nacos 发现 + 鉴权/限流/审计）──
  higress:
    image: higress-registry.cn-hangzhou.cr.aliyuncs.com/higress/all-in-one:latest
    container_name: uav-higress
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${HIGRESS_GATEWAY_HTTP_PORT:-8080}:8080"
      - "${HIGRESS_GATEWAY_HTTPS_PORT:-8443}:8443"
      - "${HIGRESS_CONSOLE_PORT:-8888}:8001"
    volumes:
      - higress-data:/data
    depends_on:
      nacos:
        condition: service_healthy
    networks: [uav-net]
    restart: unless-stopped

  # ── 审批服务（confirm_token 唯一签发方，仅内网）──
  approval:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.extensions
    image: uav-approval:latest
    container_name: uav-approval
    environment:
      APPROVAL_ADMIN_KEY: ${APPROVAL_ADMIN_KEY}
      APPROVAL_FOUR_EYES_ACTIONS: ${APPROVAL_FOUR_EYES_ACTIONS:-}
      APPROVAL_HOST: 0.0.0.0
    networks: [uav-net]
    restart: unless-stopped

  # ── UI 服务（确认卡片/视图页，浏览器打开 view_url）──
  ui:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.extensions
    image: uav-approval:latest
    container_name: uav-ui
    command: ["python", "-m", "uav_extensions.ui_service"]
    environment:
      APPROVAL_BASE: http://approval:8205
      UAV_MCP_API_KEY: ${UAV_MCP_API_KEY}
      UI_HOST: 0.0.0.0
      UI_PUBLIC_BASE: ${UI_PUBLIC_BASE}              # 对外可达（宿主 IP:8213 或域名）
    ports:
      - "8213:8213"
    depends_on: [approval]
    networks: [uav-net]
    restart: unless-stopped

  # ── 十一域 MCP（注册到 compose Nacos，用容器名）──
  mcp-services:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.mcp
    image: uav-mcp-services:latest
    container_name: uav-mcp-services
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DRONE_API_BASE: ${DRONE_API_BASE}
      DRONE_GATEWAY_BASE: ${DRONE_GATEWAY_BASE}
      DRONE_LOGIN_USERNAME: ${DRONE_LOGIN_USERNAME}
      DRONE_LOGIN_PASSWORD: ${DRONE_LOGIN_PASSWORD}
      DRONE_USER_ID_HEADER: ${DRONE_USER_ID_HEADER:-}
      UAV_MCP_API_KEY: ${UAV_MCP_API_KEY}
      UAV_TENANT_KEYS: ${UAV_TENANT_KEYS:-}
      APPROVAL_BASE: http://approval:8205
      UAV_UI_BASE: ${UI_PUBLIC_BASE}
      # 注册到 compose 内 Nacos（容器名），Higress 同网按此名发现——无需宿主 IP
      NACOS_SERVER_ADDR: nacos:8848
      NACOS_USERNAME: ${NACOS_USERNAME:-nacos}
      NACOS_PASSWORD: ${NACOS_PASSWORD}
      NACOS_ENDPOINT_MODE: direct
      MCP_SERVICE_IP: mcp-services        # 关键：注册用容器名，同网 Higress 可解析
      MCP_HOST: 0.0.0.0
      UAV_CREATE_REAL_TASK: ${UAV_CREATE_REAL_TASK:-0}
      UAV_REAL_PUBLISH: ${UAV_REAL_PUBLISH:-0}
    depends_on:
      nacos:
        condition: service_healthy
      approval:
        condition: service_started
    networks: [uav-net]
    restart: unless-stopped

networks:
  uav-net:
    driver: bridge

volumes:
  nacos-data:
  higress-data:
